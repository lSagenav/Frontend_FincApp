<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FincApp - Smart SPA for Livestock Management">
    <title>FincApp | Smart System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>

<body class="bg-slate-50 font-sans flex flex-col min-h-screen">

    <header class="bg-green-800 text-white shadow-lg sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 text-2xl font-bold cursor-pointer" onclick="navigateTo('landing')">
                <i class="fas fa-leaf"></i> FincApp
            </div>
            <ul class="flex space-x-8 font-medium">
                <li><button onclick="navigateTo('landing')" class="hover:text-green-300 transition">Home</button></li>
                <li><button onclick="navigateTo('inventory')" class="hover:text-green-300 transition">Inventory</button>
                </li>
                <li><button onclick="navigateTo('dashboard')"
                        class="hover:text-green-300 transition text-yellow-400">Dashboard</button></li>
            </ul>
            <div id="sync-status"
                class="flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-bold transition-all">
                <div id="sync-dot" class="w-2 h-2 rounded-full"></div>
                <span id="sync-text">CHECKING CONNECTION...</span>
            </div>
        </nav>
    </header>

    <main id="app-content" class="flex-grow container mx-auto px-6 py-10">
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 text-center">
        <p>&copy; 2026 FincApp SPA. Strictly English UI.</p>
    </footer>

    <script type="module">
        import { initRouter, navigateTo } from './src/js/router.js';

        window.navigateTo = navigateTo;

        document.addEventListener('DOMContentLoaded', () => {
            try {
                initRouter();
                console.log("SPA Router initialized successfully");
            } catch (error) {
                console.error("Router failed to load. Check if js/router.js exists.", error);
            }
        });
    </script>
    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3"></div>
</body>

</html>
